<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <title>Meridian Health</title>
    <meta name="robots" content="noindex,nofollow" />
    <style id="expo-reset">
      html,body{height:100%;background:#f7f5ef}
      body{overflow:hidden;margin:0}
      #root{display:flex;height:100%;flex:1}
    </style>
    <style id="portal-desktop-chrome">
      /* When the desktop portal shell is showing its LHS mega-menu the in-app
         hamburger is redundant. On mobile the shell hides its aside, so the
         hamburger must stay as the only navigation. */
      html.shell-aside-visible [data-testid="drawer-hamburger"]{display:none !important}
    </style>
  <link rel="icon" href="/brand/favicon-32.png?v=6.7q" />
  <script>
    /* Virtualise path for Expo Router: bundle was exported expecting routes
       at site root, but is hosted under /portal/app/. Strip the prefix
       before the bundle boots so router.push("/journey") and friends match. */
    (function(){
      try {
        var inFrame = window.top !== window.self;
        var asideVisible = inFrame && window.top.innerWidth >= 900;
        if (asideVisible) document.documentElement.classList.add("shell-aside-visible");
      } catch(e){ /* cross-origin: leave hamburger visible to be safe */ }
      var BASE = "/portal/app";
      var p = location.pathname;
      if (p.indexOf(BASE) === 0) {
        var virt = p.substring(BASE.length) || "/";
        if (virt.charAt(0) !== "/") virt = "/" + virt;
        /* On the desktop portal shell the LHS mega-menu replaces the in-app
           home dashboard, so land on a content route instead of "/". */
        try {
          var inFrame = window.top !== window.self;
          var parentWide = inFrame && window.top.innerWidth >= 900;
          var wantHome = /[?&]home=1\b/.test(location.search);
          if (parentWide && virt === "/" && !wantHome) virt = "/information";
        } catch(e){}
        try { history.replaceState(history.state, "", virt + location.search + location.hash); } catch(e){}
      }
    })();
  </script></head>

  <body>
    <noscript>Enable JavaScript to use the Meridian patient portal.</noscript>
    <div id="root"></div>
  <script src="/_expo/static/js/web/entry-af7cdda5eec1046a250a8943559355d3.js" defer></script>
</body>
</html>
