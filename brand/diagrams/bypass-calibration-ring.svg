<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110" fill="none" stroke="#564929" stroke-linecap="round" stroke-linejoin="round" stroke-width="0.9">
  <!-- Esophagus -->
  <line x1="30" y1="5" x2="30" y2="18"/>
  <!-- Small gastric pouch -->
  <ellipse cx="30" cy="26" rx="8" ry="8"/>
  <!-- Calibration ring (circle around pouch) -->
  <ellipse cx="30" cy="26" rx="12" ry="11" stroke-width="0.7" stroke-dasharray="2.5 1.5"/>
  <!-- Bypassed stomach (dashed) -->
  <ellipse cx="58" cy="34" rx="11" ry="14" stroke-dasharray="3 2" stroke-width="0.65"/>
  <!-- Alimentary limb -->
  <line x1="30" y1="34" x2="30" y2="68"/>
  <!-- Biliopancreatic limb -->
  <path d="M58 48 C52 54 44 60 34 68"/>
  <!-- Y junction -->
  <circle cx="30" cy="68" r="2.2" fill="#564929" stroke="none"/>
  <!-- Common channel -->
  <line x1="30" y1="68" x2="30" y2="96"/>
  <path d="M30 96 C34 100 42 104 50 106"/>
</svg>
