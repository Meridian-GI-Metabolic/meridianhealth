<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110" fill="none" stroke="#564929" stroke-linecap="round" stroke-linejoin="round" stroke-width="0.9">
  <!-- Esophagus -->
  <line x1="36" y1="5" x2="36" y2="18"/>
  <!-- Long gastric tube/pouch -->
  <path d="M29 18 C26 18 24 22 24 30 L24 72 C24 78 28 82 34 82 L40 82 C46 82 50 78 50 72 L50 30 C50 22 48 18 45 18 Z"/>
  <!-- Single anastomosis point -->
  <circle cx="37" cy="82" r="2.2" fill="#564929" stroke="none"/>
  <!-- Afferent limb (comes from right, above) -->
  <path d="M66 46 C68 56 66 66 58 72 C54 75 48 78 40 80"/>
  <!-- Efferent limb (exits bottom-left) -->
  <path d="M37 82 C34 88 32 96 34 104"/>
  <!-- Loop indication — connecting both limbs -->
  <path d="M66 46 C68 38 64 28 58 24 C52 20 44 22 40 28" stroke-dasharray="3 2" stroke-width="0.65"/>
</svg>
